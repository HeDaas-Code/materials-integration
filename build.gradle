plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.77'
}

version = '2.8.0'
group = 'materials_integration'

base {
    archivesName = 'materials_integration'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = '21.1.77'

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        materials_integration {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    mavenCentral()
    maven {
        name = "Jared's maven"
        url = "https://maven.blamejared.com/"
    }
    maven {
        name = "ModMaven"
        url = "https://modmaven.dev"
    }
}

dependencies {
    compileOnly "mezz.jei:jei-1.21.1-neoforge-api:19.21.1.312"
}
